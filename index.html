<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>רשימת קניות משותפת</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }
    .screen {
      display: none;
      padding: 2rem;
      min-height: 500px;
      animation: fadeIn 0.3s ease-in;
    }
    .screen.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #f0f0f0;
    }
    .header h1 {
      font-size: 24px;
      color: #333;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-badge {
      background: #667eea;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .sync-status {
      font-size: 12px;
      color: #999;
    }
    .sync-status.synced {
      color: #4caf50;
    }

    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 13px;
      width: auto;
    }
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    .btn-delete {
      background: #ff4444;
      color: white;
    }
    .btn-check {
      background: #4caf50;
      color: white;
    }
    .btn-check.unchecked {
      background: #ddd;
      color: #999;
    }

    .login-screen {
      text-align: center;
    }
    .login-screen .emoji {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .login-screen h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
    }
    .login-screen p {
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
    }
    .login-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      text-align: right;
      margin-bottom: 10px;
      font-family: inherit;
    }
    .login-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .quick-products {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .quick-products h3 {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 8px 14px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover {
      border-color: #667eea;
      background: #f0f0ff;
    }
    .chip.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-group input {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      text-align: right;
      font-family: inherit;
    }
    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .input-group .btn {
      width: auto;
      padding: 12px 16px;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .item.bought {
      opacity: 0.5;
      background: #f9f9f9;
    }
    .item.bought .item-name {
      text-decoration: line-through;
      color: #999;
    }
    .item-check {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }
    .item.bought .item-check {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
    }
    .item-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .item-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }
    .item-info {
      font-size: 12px;
      color: #999;
    }
    .item-info.success {
      color: #4caf50;
    }
    .item-qty {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
    }
    .qty-btn:hover {
      background: #f0f0f0;
    }
    .qty-num {
      min-width: 25px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
    }
    .item-delete {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #ff4444;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .item-delete:hover {
      background: #cc0000;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state p {
      font-size: 16px;
      margin-bottom: 10px;
    }
    .empty-state .emoji {
      font-size: 60px;
      margin-bottom: 10px;
    }

    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .nav-buttons .btn {
      padding: 10px;
      font-size: 13px;
    }

    .section-title {
      font-size: 13px;
      color: #666;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 10px;
      padding-top: 10px;
      border-top: 2px solid #f0f0f0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .editor-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .editor-item span {
      font-size: 15px;
      color: #333;
    }

    @media (max-width: 480px) {
      .screen {
        padding: 1.5rem;
        min-height: auto;
      }
      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">
    <div class="login-screen">
      <div class="emoji">🛒</div>
      <h2>רשימת קניות</h2>
      <p>מה השם שלך?</p>
      
      <div class="login-buttons">
        <button class="btn btn-primary" onclick="setUser('משה')">👨 משה</button>
        <button class="btn btn-primary" onclick="setUser('סימה')">👩 סימה</button>
      </div>
      
      <input id="nameInput" type="text" class="login-input" placeholder="או הכנס שם אחר..." maxlength="20">
      <button class="btn btn-primary" onclick="setUserCustom()">כניסה</button>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen" class="screen">
    <div class="header">
      <div>
        <h1>🛒 רשימת קניות של משפחת וייס</h1>
      </div>
      <div class="user-info">
        <div class="user-badge" id="userBadge"></div>
        <div class="sync-status" id="syncStatus">●</div>
      </div>
    </div>

    <div class="nav-buttons" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
      <button class="btn btn-secondary btn-small" onclick="showScreen('main')">🏠 בית</button>
      <button class="btn btn-secondary btn-small" onclick="showScreen('cart')">🛒 רשימה</button>
      <button class="btn btn-secondary btn-small" onclick="showScreen('editor')">✏️ עריכה</button>
      <button class="btn btn-secondary btn-small" onclick="exportPDF()">📄 PDF</button>
    </div>

    <div class="quick-products">
      <h3>לחץ על מוצר להוספה:</h3>
      <div class="chips" id="quickProducts"></div>
    </div>

    <div class="input-group">
      <input id="customInput" type="text" placeholder="מוצר חדש..." maxlength="40">
      <button class="btn btn-primary btn-small" onclick="addCustomItem()">＋</button>
    </div>

    <h3 style="font-size: 13px; color: #666; font-weight: 600; margin-bottom: 10px;">רשימת הקניות:</h3>
    <div class="items-list" id="itemsList"></div>
    <div class="empty-state" id="emptyState">
      <div class="emoji">🛍️</div>
      <p>הרשימה ריקה</p>
    </div>
  </div>

  <!-- CART SCREEN -->
  <div id="cartScreen" class="screen">
    <div class="header">
      <div>
        <h1>🛒 רשימת הקניות</h1>
      </div>
      <button class="btn btn-secondary btn-small btn-icon" onclick="showScreen('main')" style="position: absolute; top: 20px; left: 20px;">←</button>
    </div>

    <div class="items-list" id="cartList"></div>
    <div class="empty-state" id="cartEmpty">
      <div class="emoji">🛍️</div>
      <p>הרשימה ריקה</p>
    </div>

    <div id="boughtSection" style="display: none;">
      <div class="section-title">✓ נקנה — יימחק אוטומטית לאחר יום</div>
      <div class="items-list" id="boughtList"></div>
    </div>
  </div>

  <!-- EDITOR SCREEN -->
  <div id="editorScreen" class="screen">
    <div class="header">
      <div>
        <h1>✏️ עריכת מוצרים</h1>
      </div>
      <button class="btn btn-secondary btn-small btn-icon" onclick="showScreen('main')" style="position: absolute; top: 20px; left: 20px;">←</button>
    </div>

    <p style="font-size: 13px; color: #999; margin-bottom: 15px;" id="editorCount"></p>

    <div class="input-group">
      <input id="editorInput" type="text" placeholder="שם מוצר חדש..." maxlength="30">
      <button class="btn btn-primary btn-small" onclick="addQuickProduct()">＋</button>
    </div>

    <div id="editorList"></div>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="resetToDefault()" style="flex: 1;">איפוס</button>
      <button class="btn btn-primary" onclick="showScreen('main')" style="flex: 1;">שמור וסגור</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xrjoixwgwgjxqlljmeof.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyam9peHdnd2dqeHFsbGptZW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjczMTMsImV4cCI6MjA5NDc0MzMxM30.lpTKaVeL_xlWIgKXXMMq-BBbYT8jOe7xqtumMXxbv_s';
const DEFAULT_QUICK = ['חלב','לחם','ביצים','גבינה','ירקות','פירות','עוף','דגים','אורז','פסטה','שמן זית','טיטולים','מגבונים','יוגורט','חמאה','קפה','סוכר','קמח','עגבניות','מלפפון','בצל','שום','תפוחי אדמה','בננות','תפוחים'];

let supabase;
let currentUser = null;
let currentScreen = 'main';
let quickProducts = [...DEFAULT_QUICK];
let allItems = [];
let realtimeSubscription = null;

// Initialize Supabase
supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function setUser(name) {
  currentUser = name;
  document.getElementById('userBadge').textContent = '👤 ' + name;
  showScreen('main');
  await loadItems();
  await loadQuickProducts();
  subscribeToChanges();
  updateSync();
}

function setUserCustom() {
  const name = document.getElementById('nameInput').value.trim();
  if (name) setUser(name);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  currentScreen = name;
  document.getElementById(name + 'Screen').classList.add('active');
  
  if (name === 'main' || name === 'cart') {
    loadItems();
  }
  if (name === 'editor') {
    renderEditor();
  }
}

async function loadQuickProducts() {
  const saved = localStorage.getItem('quickProducts');
  if (saved) {
    quickProducts = JSON.parse(saved);
  }
  renderQuickProducts();
}

function renderQuickProducts() {
  const container = document.getElementById('quickProducts');
  container.innerHTML = '';
  const inList = new Set(allItems.filter(i => !i.bought).map(i => i.name));
  
  quickProducts.forEach(product => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (inList.has(product) ? ' active' : '');
    chip.textContent = product;
    chip.onclick = () => addItem(product);
    container.appendChild(chip);
  });
}

async function loadItems() {
  const { data, error } = await supabase
    .from('shopping_items')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error) {
    console.error('Error loading items:', error);
    return;
  }
  
  allItems = data || [];
  
  if (currentScreen === 'main') {
    renderMainList();
  } else if (currentScreen === 'cart') {
    renderCartList();
  }
  
  updateSync();
}

async function addItem(name) {
  if (!name.trim()) return;
  
  const exists = allItems.find(i => i.name === name && !i.bought);
  
  if (exists) {
    const { error } = await supabase
      .from('shopping_items')
      .update({ quantity: exists.quantity + 1 })
      .eq('id', exists.id);
    if (error) console.error('Error updating:', error);
  } else {
    const { error } = await supabase
      .from('shopping_items')
      .insert({
        name: name,
        quantity: 1,
        bought: false,
        added_by: currentUser
      });
    if (error) console.error('Error adding:', error);
  }
  
  await loadItems();
  renderQuickProducts();
}

function addCustomItem() {
  const input = document.getElementById('customInput');
  addItem(input.value);
  input.value = '';
}

async function toggleBought(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  
  const { error } = await supabase
    .from('shopping_items')
    .update({
      bought: !item.bought,
      bought_by: !item.bought ? currentUser : null,
      bought_at: !item.bought ? new Date().toISOString() : null
    })
    .eq('id', id);
  
  if (error) console.error('Error toggling:', error);
  await loadItems();
  renderQuickProducts();
}

async function changeQuantity(id, delta) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  
  const newQty = Math.max(1, item.quantity + delta);
  const { error } = await supabase
    .from('shopping_items')
    .update({ quantity: newQty })
    .eq('id', id);
  
  if (error) console.error('Error updating qty:', error);
  await loadItems();
}

async function deleteItem(id) {
  const { error } = await supabase
    .from('shopping_items')
    .delete()
    .eq('id', id);
  
  if (error) console.error('Error deleting:', error);
  await loadItems();
  renderQuickProducts();
}

function timeAgo(ts) {
  if (!ts) return '';
  const now = new Date();
  const time = new Date(ts);
  const diff = (now - time) / 1000 / 60 / 60; // hours
  
  if (diff < 1) return 'לפני פחות משעה';
  if (diff < 24) return `לפני ${Math.floor(diff)} שעות`;
  return 'לפני יום';
}

function createItemElement(item) {
  const div = document.createElement('div');
  div.className = 'item' + (item.bought ? ' bought' : '');
  
  div.innerHTML = `
    <div class="item-check ${item.bought ? '' : 'unchecked'}" onclick="toggleBought(${item.id})">
      ${item.bought ? '✓' : ''}
    </div>
    <div class="item-content">
      <div class="item-name">${escapeHtml(item.name)}</div>
      <div class="item-info ${item.bought ? 'success' : ''}">
        ${item.bought 
          ? `✓ ${escapeHtml(item.bought_by)} · ${timeAgo(item.bought_at)}`
          : `נוסף ע"י ${escapeHtml(item.added_by)}`
        }
      </div>
    </div>
    <div class="item-qty">
      <button class="qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
      <span class="qty-num">${item.quantity}</span>
      <button class="qty-btn" onclick="changeQuantity(${item.id}, -1)">−</button>
    </div>
    <button class="item-delete" onclick="deleteItem(${item.id})">✕</button>
  `;
  
  return div;
}

function renderMainList() {
  const container = document.getElementById('itemsList');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  
  const active = allItems.filter(i => !i.bought);
  const bought = allItems.filter(i => i.bought);
  
  if (allItems.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }
  
  active.forEach(item => container.appendChild(createItemElement(item)));
  
  if (bought.length > 0) {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = '✓ נקנה';
    container.appendChild(title);
    bought.forEach(item => container.appendChild(createItemElement(item)));
  }
}

function renderCartList() {
  const container = document.getElementById('cartList');
  const empty = document.getElementById('cartEmpty');
  const boughtSection = document.getElementById('boughtSection');
  const boughtList = document.getElementById('boughtList');
  
  container.innerHTML = '';
  boughtList.innerHTML = '';
  
  const active = allItems.filter(i => !i.bought);
  const bought = allItems.filter(i => i.bought);
  
  if (active.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }
  
  active.forEach(item => container.appendChild(createItemElement(item)));
  
  if (bought.length > 0) {
    boughtSection.style.display = 'block';
    bought.forEach(item => boughtList.appendChild(createItemElement(item)));
  } else {
    boughtSection.style.display = 'none';
  }
}

async function addQuickProduct() {
  const input = document.getElementById('editorInput');
  const name = input.value.trim();
  
  if (!name) return;
  if (quickProducts.length >= 50) {
    alert('הגעת למקסימום 50 מוצרים');
    return;
  }
  if (quickProducts.includes(name)) {
    alert('המוצר כבר קיים');
    return;
  }
  
  quickProducts.push(name);
  localStorage.setItem('quickProducts', JSON.stringify(quickProducts));
  input.value = '';
  renderEditor();
  renderQuickProducts();
}

async function removeQuickProduct(idx) {
  quickProducts.splice(idx, 1);
  localStorage.setItem('quickProducts', JSON.stringify(quickProducts));
  renderEditor();
  renderQuickProducts();
}

async function resetToDefault() {
  if (!confirm('לאפס את רשימת המוצרים לברירת המחדל?')) return;
  quickProducts = [...DEFAULT_QUICK];
  localStorage.setItem('quickProducts', JSON.stringify(quickProducts));
  renderEditor();
  renderQuickProducts();
}

function renderEditor() {
  const container = document.getElementById('editorList');
  container.innerHTML = '';
  
  document.getElementById('editorCount').textContent = `${quickProducts.length} מוצרים (מקסימום 50)`;
  
  quickProducts.forEach((product, idx) => {
    const div = document.createElement('div');
    div.className = 'editor-item';
    div.innerHTML = `
      <span>${escapeHtml(product)}</span>
      <button class="btn btn-delete btn-small" onclick="removeQuickProduct(${idx})">✕</button>
    `;
    container.appendChild(div);
  });
}

function subscribeToChanges() {
  if (realtimeSubscription) {
    realtimeSubscription.unsubscribe();
  }
  
  realtimeSubscription = supabase
    .channel('shopping_items')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'shopping_items'
      },
      (payload) => {
        loadItems();
      }
    )
    .subscribe();
}

function updateSync() {
  const status = document.getElementById('syncStatus');
  status.textContent = '✓';
  status.classList.add('synced');
  setTimeout(() => {
    status.textContent = '●';
    status.classList.remove('synced');
  }, 2000);
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

  if (bought.length > 0) {

    `;

      htmlContent += `

    html2canvas: { scale: 2 },
